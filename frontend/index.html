<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智枢 · 知识库问答与工单 Agent 控制台</title>
<style>
  /* ───────────────────────────────────────────────────────────
     视觉基调：参考 Claude 官网的暖奶油色系。
       底色 Pampas #F4F3EE，招牌珊瑚 Crail #C15F3C，暖近黑文字，
       衬线字承载品牌字标，等宽字承载工单号/片段编号。
     签名元素保留：回答下方的「引用索引卡」—— 珊瑚色档案卡，挂出处。
     交互强调「平滑」：入场淡入上移、流式光标、悬浮微抬升、缓动滚动。
     ─────────────────────────────────────────────────────────── */
  :root {
    --cream:      #f4f3ee;   /* Pampas，应用底色 */
    --cream-2:    #faf9f5;   /* 抬起表面 */
    --paper:      #ffffff;
    --ink:        #1f1e1c;   /* 暖近黑正文 */
    --ink-soft:   #56524a;   /* 次级文字 */
    --muted:      #908979;   /* Cloudy 暖灰 */
    --accent:     #c15f3c;   /* Crail，Claude 珊瑚 */
    --accent-hi:  #a94d2d;   /* 按下/悬浮加深 */
    --accent-soft:#f1e3da;   /* 珊瑚浅填充 */
    --tan:        #d4a27f;
    --line:       #e8e3d8;   /* 暖色发丝线 */
    --user-bubble:#ece6db;   /* 用户气泡：暖米 */
    --warn:       #9a5b1f;
    --shadow-sm:  0 1px 2px rgba(50,38,24,.05);
    --shadow-md:  0 1px 2px rgba(50,38,24,.04), 0 10px 28px rgba(50,38,24,.07);
    --serif: ui-serif, "Songti SC", Georgia, "Times New Roman", serif;
    --sans: "PingFang SC", "Microsoft YaHei", -apple-system, "Segoe UI", sans-serif;
    --mono: ui-monospace, "SF Mono", "JetBrains Mono", Consolas, monospace;
    --ease: cubic-bezier(.22,.61,.36,1);
  }
  * { box-sizing: border-box; margin: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: var(--sans);
    background: var(--cream);
    color: var(--ink);
    height: 100vh; display: flex; flex-direction: column;
    -webkit-font-smoothing: antialiased;
    font-size: 14px;
  }

  /* ── 顶栏 ── */
  header {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 26px;
    background: rgba(250,249,245,.82);
    backdrop-filter: saturate(180%) blur(10px);
    border-bottom: 1px solid var(--line);
  }
  .brand { display: flex; align-items: baseline; gap: 11px; }
  .brand .spark { width: 9px; height: 9px; border-radius: 50%;
    background: var(--accent); align-self: center;
    box-shadow: 0 0 0 4px var(--accent-soft); }
  .brand h1 { font-family: var(--serif); font-size: 21px; font-weight: 600;
    letter-spacing: 4px; color: var(--ink); }
  .brand .sub { font-size: 12px; color: var(--muted); letter-spacing: .3px; }
  .auth { margin-left: auto; display: flex; gap: 8px; align-items: center; }
  .who { font-size: 12.5px; color: var(--ink-soft); }
  .who b { color: var(--accent); font-weight: 600; }

  input, button { font: inherit; }
  input {
    padding: 8px 12px; border: 1px solid var(--line); border-radius: 9px;
    background: var(--paper); color: var(--ink);
    transition: border-color .18s var(--ease), box-shadow .18s var(--ease);
  }
  input::placeholder { color: var(--muted); }
  input:focus { outline: none; border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft); }
  button {
    padding: 8px 16px; border: none; border-radius: 9px;
    background: var(--accent); color: #fff; cursor: pointer; font-weight: 500;
    transition: transform .16s var(--ease), background .16s var(--ease), box-shadow .16s var(--ease);
  }
  button:hover:not(:disabled) { background: var(--accent-hi);
    transform: translateY(-1px); box-shadow: var(--shadow-sm); }
  button:active:not(:disabled) { transform: translateY(0); }
  button:disabled { opacity: .45; cursor: not-allowed; }
  button.ghost { background: transparent; color: var(--accent);
    border: 1px solid var(--line); }
  button.ghost:hover:not(:disabled) { background: var(--accent-soft);
    border-color: var(--accent-soft); }

  /* ── 主区 ── */
  main { flex: 1; display: grid; grid-template-columns: 296px 1fr; min-height: 0; }

  aside {
    border-right: 1px solid var(--line);
    background: var(--cream-2);
    padding: 20px; overflow-y: auto;
  }
  aside h2 { font-family: var(--serif); font-size: 14px; color: var(--ink);
    letter-spacing: 1px; margin-bottom: 4px; }
  aside .hint { font-size: 11.5px; color: var(--muted); margin-bottom: 14px; }
  .uploader { display: flex; flex-direction: column; gap: 9px; margin-bottom: 18px; }
  .uploader input[type=file] { font-size: 12px; padding: 7px; cursor: pointer; }
  .uploader input[type=file]::file-selector-button {
    font: inherit; margin-right: 9px; padding: 5px 11px; border: none;
    border-radius: 7px; background: var(--accent-soft); color: var(--accent);
    cursor: pointer; transition: background .16s var(--ease); }
  .uploader input[type=file]::file-selector-button:hover { background: #ecd9cd; }

  .doc {
    font-size: 12.5px; padding: 11px 12px; border: 1px solid var(--line);
    border-radius: 11px; margin-bottom: 9px; background: var(--paper);
    transition: transform .18s var(--ease), box-shadow .18s var(--ease), border-color .18s var(--ease);
    animation: cardIn .42s var(--ease) both;
  }
  .doc:hover { transform: translateY(-1px); box-shadow: var(--shadow-sm);
    border-color: #ddd6c8; }
  .doc .name { color: var(--ink); font-weight: 500; word-break: break-all; line-height: 1.5; }
  .doc .st { display: inline-flex; align-items: center; gap: 6px;
    font-family: var(--mono); font-size: 11px; color: var(--muted); margin-top: 6px; }
  .doc .st .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); }
  .doc .st.ready .dot { background: var(--accent); }
  .doc .st.parsing .dot { background: var(--tan); animation: pulse 1.1s ease-in-out infinite; }
  .doc .empty { font-size: 12px; color: var(--muted); padding: 18px 4px; line-height: 1.7; }

  /* ── 对话区 ── */
  #chat { display: flex; flex-direction: column; min-height: 0; }
  #msgs { flex: 1; overflow-y: auto; padding: 30px 28px 18px;
    display: flex; flex-direction: column; gap: 18px;
    scroll-behavior: smooth; }
  #msgs::-webkit-scrollbar { width: 10px; }
  #msgs::-webkit-scrollbar-thumb { background: #e0dacd; border-radius: 10px;
    border: 3px solid var(--cream); }
  #msgs::-webkit-scrollbar-thumb:hover { background: var(--tan); }

  .welcome { margin: auto; text-align: center; color: var(--muted); max-width: 440px; }
  .welcome .mark { font-family: var(--serif); font-size: 30px; color: var(--ink);
    letter-spacing: 6px; margin-bottom: 12px; }
  .welcome p { font-size: 13.5px; line-height: 1.85; }

  .row { display: flex; animation: msgIn .44s var(--ease) both; }
  .row.me { justify-content: flex-end; }
  .row.ai { justify-content: flex-start; }
  .msg { max-width: 74%; padding: 13px 17px; line-height: 1.78; font-size: 14px;
    white-space: pre-wrap; word-break: break-word; }
  .me .msg { background: var(--user-bubble); color: var(--ink);
    border-radius: 16px 16px 5px 16px; }
  .ai .msg { background: var(--paper); border: 1px solid var(--line);
    border-radius: 16px 16px 16px 5px; box-shadow: var(--shadow-sm); }

  .badge { display: inline-block; font-size: 11px; font-family: var(--mono);
    padding: 3px 9px; border-radius: 999px; margin-bottom: 9px; font-weight: 500;
    animation: msgIn .3s var(--ease) both; }
  .badge.cache  { background: var(--accent-soft); color: var(--accent); }
  .badge.ticket { background: #f5ead9; color: var(--warn); }

  /* 流式光标 */
  .caret { display: inline-block; width: 7px; height: 1.05em; margin-left: 2px;
    vertical-align: -2px; background: var(--accent); border-radius: 1px;
    animation: blink 1s step-end infinite; }

  /* 思考中三点 */
  .typing { display: inline-flex; gap: 5px; padding: 3px 0; }
  .typing span { width: 7px; height: 7px; border-radius: 50%; background: var(--tan);
    animation: bounce 1.3s ease-in-out infinite; }
  .typing span:nth-child(2) { animation-delay: .18s; }
  .typing span:nth-child(3) { animation-delay: .36s; }

  /* 签名元素：引用索引卡 */
  .sources { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px;
    padding-top: 11px; border-top: 1px dashed var(--line); }
  .src-card { font-family: var(--mono); font-size: 11px; color: var(--accent);
    background: var(--accent-soft); border-left: 3px solid var(--accent);
    padding: 5px 10px; border-radius: 0 8px 8px 0;
    animation: cardIn .4s var(--ease) both;
    transition: transform .16s var(--ease); }
  .src-card:hover { transform: translateX(2px); }

  /* ── 输入条 ── */
  #inputBar { display: flex; gap: 10px; padding: 16px 28px 20px;
    background: linear-gradient(to top, var(--cream) 55%, rgba(244,243,238,0));
    align-items: flex-end; }
  #question { flex: 1; resize: none; min-height: 46px; max-height: 150px;
    border-radius: 14px; padding: 12px 16px; line-height: 1.6;
    box-shadow: var(--shadow-sm); }
  #askBtn { height: 46px; padding: 0 22px; border-radius: 14px; }

  @keyframes msgIn { from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); } }
  @keyframes cardIn { from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); } }
  @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .3; } }
  @keyframes bounce { 0%,80%,100% { transform: translateY(0); opacity:.5; }
    40% { transform: translateY(-5px); opacity:1; } }

  @media (max-width: 760px) {
    main { grid-template-columns: 1fr; }
    aside { display: none; }
    .msg { max-width: 86%; }
  }
  @media (prefers-reduced-motion: reduce) {
    *, ::before, ::after { animation: none !important;
      transition-duration: .01ms !important; scroll-behavior: auto !important; }
  }
</style>
</head>
<body>
<header>
  <div class="brand">
    <span class="spark"></span>
    <h1>智枢</h1>
    <span class="sub">企业知识库问答 · 智能工单 Agent</span>
  </div>
  <div class="auth">
    <span class="who" id="who"></span>
    <input id="u" placeholder="用户名" value="demo">
    <input id="p" type="password" placeholder="密码" value="123456">
    <button onclick="auth()">登录 / 注册</button>
  </div>
</header>

<main>
  <aside>
    <h2>知识库文档</h2>
    <div class="hint">上传后自动解析、切分、向量化</div>
    <div class="uploader">
      <input type="file" id="file">
      <button class="ghost" onclick="upload()">上传并解析</button>
    </div>
    <div id="docs"></div>
  </aside>

  <section id="chat">
    <div id="msgs">
      <div class="welcome" id="welcome">
        <div class="mark">智枢</div>
        <p>登录后上传企业文档构建私有知识库。<br>
           提问将基于检索结果作答并标注来源；<br>
           知识库无法解答时，自动转交工单 Agent 处理。</p>
      </div>
    </div>
    <div id="inputBar">
      <textarea id="question" rows="1" placeholder="向知识库提问，无法解答会自动转工单…"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();ask()}"
        oninput="autosize(this)"></textarea>
      <button id="askBtn" onclick="ask()">发送</button>
    </div>
  </section>
</main>

<script>
const API = 'http://localhost:8080';
let token = '';
const convId = 'web-' + Date.now();

function autosize(el){ el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,150)+'px'; }
function clearWelcome(){ const w=document.getElementById('welcome'); if(w) w.remove(); }

async function auth() {
  const body = JSON.stringify({ username: u.value, password: p.value });
  let r = await fetch(API + '/api/auth/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body });
  let j = await r.json();
  if (j.code !== 0) {
    r = await fetch(API + '/api/auth/register', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body });
    j = await r.json();
  }
  if (j.code === 0) {
    token = j.data.token;
    document.getElementById('who').innerHTML = '已登录 <b>' + u.value + '</b>';
    loadDocs();
    addMsg('ai', '已登录。上传文档构建知识库，然后开始提问。');
  } else alert(j.message);
}

async function upload() {
  if (!file.files[0]) return alert('请先选择文件');
  const fd = new FormData(); fd.append('file', file.files[0]);
  const r = await fetch(API + '/api/doc/upload', { method: 'POST', headers: { Authorization: 'Bearer ' + token }, body: fd });
  const j = await r.json();
  if (j.code === 0) pollProgress(j.data.id);
  loadDocs();
}

async function pollProgress(id) {
  const r = await fetch(API + `/api/doc/${id}/progress`, { headers: { Authorization: 'Bearer ' + token } });
  const j = await r.json();
  loadDocs();
  if (j.data && j.data.status === 'PARSING') setTimeout(() => pollProgress(id), 1500);
}

async function loadDocs() {
  const r = await fetch(API + '/api/doc/list', { headers: { Authorization: 'Bearer ' + token } });
  const j = await r.json();
  const list = j.data || [];
  if (!list.length) { docs.innerHTML = '<div class="empty">还没有文档。上传后即可基于其内容问答。</div>'; return; }
  docs.innerHTML = list.map(d => {
    const ready = d.status !== 'PARSING';
    return `<div class="doc">
      <div class="name">${escapeHtml(d.fileName)}</div>
      <span class="st ${ready?'ready':'parsing'}"><span class="dot"></span>${d.status} · ${d.chunkCount} chunks</span>
    </div>`;
  }).join('');
}

function addMsg(cls, text) {
  clearWelcome();
  const row = document.createElement('div');
  row.className = 'row ' + cls;
  const div = document.createElement('div');
  div.className = 'msg';
  div.textContent = text;
  row.appendChild(div);
  msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight;
  return div;
}

/* SSE：用 fetch ReadableStream 手动解析 event/data 帧（复用同一连接展示多种自定义事件） */
async function ask() {
  const q = question.value.trim();
  if (!q || !token) return;
  question.value = ''; autosize(question); askBtn.disabled = true;
  addMsg('me', q);
  const aiDiv = addMsg('ai', '');
  aiDiv.innerHTML = '<span class="typing"><span></span><span></span><span></span></span>';
  let body = '', srcHtml = '', badge = '', started = false;

  const url = `${API}/api/chat/stream?conversationId=${convId}&question=${encodeURIComponent(q)}&token=${token}`;
  const resp = await fetch(url);
  const reader = resp.body.getReader();
  const decoder = new TextDecoder();
  let buf = '';

  const render = (streaming) => {
    const caret = streaming ? '<span class="caret"></span>' : '';
    aiDiv.innerHTML = badge + escapeHtml(body) + caret + srcHtml;
    msgs.scrollTop = msgs.scrollHeight;
  };

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buf += decoder.decode(value, { stream: true });
    let idx;
    while ((idx = buf.indexOf('\n\n')) >= 0) {
      const frame = buf.slice(0, idx); buf = buf.slice(idx + 2);
      let event = 'message', data = '';
      for (const line of frame.split('\n')) {
        if (line.startsWith('event:')) event = line.slice(6).trim();
        if (line.startsWith('data:')) data += line.slice(5);
      }
      if (event === 'token') { started = true; body += data; render(true); }
      else if (event === 'cached') { badge = '<span class="badge cache">来自历史相似问题 · 语义缓存</span><br>'; render(true); }
      else if (event === 'ticket') { badge = '<span class="badge ticket">知识库无法解答 · 已转工单 Agent</span><br>'; render(true); }
      else if (event === 'source') {
        try {
          const arr = JSON.parse(data);
          srcHtml = '<div class="sources">' + arr.map(s =>
            `<span class="src-card">[片段${s.index}] ${escapeHtml(s.file)} #${s.seq}</span>`).join('') + '</div>';
          render(!event || started);
        } catch (e) { /* ignore */ }
      }
      else if (event === 'error') { started = true; body += '\n⚠ ' + data; render(true); }
    }
  }
  if (!started && !srcHtml && !badge) body = '（无返回内容）';
  render(false);
  askBtn.disabled = false;
}

function escapeHtml(s) {
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
</script>
</body>
</html>
